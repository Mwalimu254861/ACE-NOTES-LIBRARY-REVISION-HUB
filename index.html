<!DOCTYPE html>

<meta charset="UTF-8">

<title>KCSE Past Papers Library</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #003366, #0056b3);
    color:white;
}

/* Header */
.header{
    text-align:center;
    padding:40px 20px;
}

.header h1{
    font-size:45px;
    margin-bottom:10px;
}

.header p{
    font-size:22px;
    opacity:0.9;
}

/* Subjects Grid */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    padding:30px;
}

/* Subject Cards */
.subject{
    background:white;
    color:#003366;
    padding:30px;
    text-align:center;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.subject:hover{
    transform:scale(1.05);
    background:#f0f8ff;
}

/* Footer */
.footer{
    text-align:center;
    padding:20px;
    font-size:16px;
    opacity:0.8;
}

a{
    text-decoration:none;
}

</style>
</head>
