<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics KCSE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

.header {
    background: #002244; /* Dark Navy for Physics */
    color: white;
    text-align: center;
    padding: 25px;
    font-size: 28px;
    font-weight: bold;
}

.year-btn {
    width: 100%;
    padding: 18px;
    font-size: 22px;
    background: #0056b3;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
}

.paper-box {
    display: none;
    background: white;
    padding: 15px;
}

.paper-btn {
    display: block;
    text-decoration: none;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">
    PHYSICS KCSE PAST PAPERS
</div>

<button class="year-btn" onclick="toggle('physics-revision')">  
    PHYSICS REVISION MATERIAL
</button>  

<div id="physics-revision" class="paper-box">  
    <a href="PHYSICS%20MADE%20FAMILIAR%20QNS.pdf" target="_blank" class="paper-btn" style="background: #dc3545; font-size: 26px; font-weight: bold; padding: 22px; color: white; margin-top: 10px;">  
        KCSE MADE FAMILIAR  
    </a>
</div>  
      
<script>
function toggle(id) {
    let box = document.getElementById(id);
    if (box.style.display === "block") {
        box.style.display = "none";
    } else {
        box.style.display = "block";
    }
}
</script>  
</body>
</html>
